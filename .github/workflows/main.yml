name: Main

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v3

    - name: Build search index from HTML
      run: node scripts/build-search-index.js

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v1.7.0
      with:
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Ensure S3 CORS for docs index fetch
      run: |
        aws s3api put-bucket-cors \
          --bucket "${{ secrets.PROD_AWS_S3_BUCKET_NAME }}" \
          --cors-configuration file://infra/s3-cors.json

    - name: Copy files to S3 bucket
      run: |
        aws s3 sync ./ s3://${{ secrets.PROD_AWS_S3_BUCKET_NAME }} --delete --exclude ".git/*" --exclude ".github/*" --exclude "README.md"

    - name: Invalidate CloudFront Stale Distribution
      run: |
        distribution_id="EAZNJ59O08YJX"
        echo "CloudFront Distribution ID: ${distribution_id}"
        aws cloudfront create-invalidation --distribution-id ${distribution_id} --paths "/*"
        echo "Invalidation Started For CloudFront Distribution ID: ${distribution_id}"
